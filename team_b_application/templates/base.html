<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Personal Trainer - Real-time exercise tracking with pose estimation">
    <title>{% block title %}AI Trainer{% endblock %} | FlexAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">F</div>
                <div class="logo-text">Flex<span>AI</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-item {{ 'active' if active_page == 'dashboard' else '' }}">
                    <span class="nav-icon">🏠</span>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('exercises') }}" class="nav-item {{ 'active' if active_page == 'exercises' else '' }}">
                    <span class="nav-icon">🏋️</span>
                    <span>Exercises</span>
                </a>
                <a href="{{ url_for('history') }}" class="nav-item {{ 'active' if active_page == 'history' else '' }}">
                    <span class="nav-icon">📋</span>
                    <span>History</span>
                </a>
                <a href="{{ url_for('analytics') }}" class="nav-item {{ 'active' if active_page == 'analytics' else '' }}">
                    <span class="nav-icon">📊</span>
                    <span>Analytics</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>FlexAI Trainer v2.0<br>Powered by MediaPipe</p>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
